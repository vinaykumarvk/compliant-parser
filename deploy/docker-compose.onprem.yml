services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: compliant-parser:local
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_ADMIN_USERNAME: operator
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:?set APP_ADMIN_PASSWORD}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:?set APP_SESSION_SECRET}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://iqw:${POSTGRES_PASSWORD:-iqw-local-password}@postgres:5432/iqw
      OBJECT_STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: iqw-documents
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OPENSEARCH_URL: http://opensearch:9200
      REDIS_URL: redis://redis:6379/0
      IQW_JOB_BACKEND: redis
      IQW_OCR_PROVIDER: self_hosted
      IQW_SELF_HOSTED_OCR_URL: ${IQW_SELF_HOSTED_OCR_URL:-http://ocr-gateway:8080/ocr}
      IQW_LLM_PROVIDER: self_hosted
      IQW_SELF_HOSTED_LLM_URL: ${IQW_SELF_HOSTED_LLM_URL:-http://llm-gateway:8000}
      EXTERNAL_AI_API_APPROVED: "false"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: iqw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iqw-local-password}
      POSTGRES_DB: iqw
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iqw -d iqw"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
  opensearch-data:
  redis-data:
